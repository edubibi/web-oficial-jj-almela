<!DOCTYPE html>
<html>
<body>
    <canvas id="canvas"></canvas>
    <div id="result" style="display:none"></div>
    <script>
        const img = new Image();
        img.onload = function() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                // If it's very white OR if it's the grey/white checkerboard pattern from the previous tool
                // Checkerboard colors are usually around (204, 204, 204) and (255, 255, 255)
                const isWhite = r > 240 && g > 240 && b > 240;
                const isGrey = r > 200 && g > 200 && b > 200 && Math.abs(r-g) < 5 && Math.abs(g-b) < 5;
                
                if (isWhite || isGrey) {
                    data[i+3] = 0; // Alpha = 0
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
            document.getElementById('result').innerText = canvas.toDataURL('image/png');
        };
        img.src = 'notas_with_checkerboard.png'; // I'll rename the bad file to this
    </script>
</body>
</html>
