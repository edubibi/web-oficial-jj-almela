<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts para elegancia y glamour -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <!-- Iconos FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css?v=v4.1-light-player">
</head>
<body>

    <!-- Navegación -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo">
                <a href="#inicio">
                    <img src="assets/images/logo_blanco.png" alt="JJ Almela Logo" class="nav-logo-img">
                </a>
            </div>
                        <ul class="nav-links">
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="sobre-mi.html">Sobre Mí</a></li>
                <li><a href="mi-musica.html">Mi Música</a></li>
                <li><a href="mis-videos.html">Mis Vídeos</a></li>
                <li><a href="colaboraciones.html">Colaboraciones</a></li>
                <li><a href="mis-gustos.html">Mis gustos</a></li>
                <li><a href="imagenes.html">Imágenes</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
            <button class="mobile-menu-toggle" id="mobile-toggle" aria-label="Abrir menú">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- Entrada / Hero Section (Glamour y Elegancia) -->
    <section id="inicio" class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-layout">
            <!-- Margen 22%: Espacio Reservado para Texto Izquierdo (Slogan) -->
            <div class="left-margin">
                <div class="hero-claim-container">
                    <h1 class="hero-claim">Música<br>que acaricia<br>el alma</h1>
                </div>
            </div>
            
            <!-- Centro 72%: Foto principal Gigante con Composición de Capas -->
            <div class="center-image">
                <div class="photo-composition">
                    <!-- Capa 1: Fondo Piano -->
                    <img src="assets/images/piano_cola_concert.png" alt="Concierto Piano" class="giant-photo base-layer">
                    
                    <!-- Capa 2: Tira vertical de la chica en escalera (Opacidad 72%) -->
                    <img src="assets/images/tira_ chica_escalera.png" alt="Chica bajando escalera" class="overlay-layer">
                </div>
            </div>
            
            <!-- Margen 8%: Iconos Redes Sociales Verticales -->
            <div class="right-margin">
                <div class="social-vertical">
                    <!-- Enlaces provisionales, el usuario los sustituirá por los suyos reales -->
                    <a href="https://instagram.com" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                    <a href="https://youtube.com" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
                    <a href="https://spotify.com" target="_blank" aria-label="Spotify"><i class="fab fa-spotify"></i></a>
                    <a href="mailto:correo@jjalmela.com" aria-label="Contacto"><i class="fas fa-envelope"></i></a>
                </div>
            </div>
        </div>
    </section>

    <!-- SECCIÓN: ATAJOS GEOMÉTRICOS (Puertas de entrada rápidas) -->
    <section id="atajos" class="geometric-shortcuts-section">
        <div class="shortcuts-container">
            <!-- MIS GUSTOS -->
            <a href="mis-gustos.html" class="shape-shortcut shape-gustos">
                <span>Mis<br>Gustos</span>
            </a>

            <!-- IMÁGENES -->
            <a href="imagenes.html" class="shape-shortcut shape-imagenes">
                <span>Imágenes</span>
            </a>

            <!-- COLABORACIONES -->
            <a href="colaboraciones.html" class="shape-shortcut shape-colaboraciones">
                <span>Colaboraciones</span>
            </a>
        </div>
    </section>

    <!-- PIE DE PÁGINA (Footer) -->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-left">
                &copy; jjalmela 2026
            </div>
            <div class="footer-right">
                Diseños Eduardo Ramírez & AnG
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
